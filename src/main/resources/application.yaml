server:
  port: 8091

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/discordia
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
      ddl-auto: create-drop # Automatically update the database schema
    show-sql: true
    properties:
      hibernate:
        # Optional: Explicitly setting this if auto-detection still fails
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  application:
    name: discordia
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 8MB
